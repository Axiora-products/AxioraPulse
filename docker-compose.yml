services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # named volume — persists across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexpulse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # loads ANTHROPIC_KEY, SECRET_KEY, RAZORPAY, etc.
    environment:
      DATABASE_URL: "postgresql://postgres:root@db:5432/nexpulse"   # overrides RDS url from .env
      FRONTEND_URL: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app           # bind-mount for live code changes
      - /app/venv                # keep container's installed packages intact

  # ── React / Vite Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env          # loads VITE_COGNITO_* vars
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"   # always hit local backend
    depends_on:
      - backend
    volumes:
      - ./frontend:/app          # bind-mount for HMR
      - /app/node_modules        # keep container's node_modules intact

# Named volume — only deleted with `docker compose down -v`
volumes:
  postgres_data:
    driver: local