services:
  pulse-db:
    image: postgres:17
    container_name: pulse-db
    environment:
      POSTGRES_DB: nexpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pulse-db-data:/var/lib/postgresql/data
    networks:
      - pulse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  pulse-floci:
    image: floci/floci:latest
    container_name: pulse-floci
    ports:
      - "4566:4566"
    environment:
      - EXTRA_CORS_ALLOWED_ORIGINS=*
      - EXTRA_CORS_ALLOWED_HEADERS=*
      - FLOCI_SECURITY_EXTRA_CORS_ALLOWED_ORIGINS=*
      - FLOCI_SECURITY_EXTRA_CORS_ALLOWED_HEADERS=*
      - FLOCI_SECURITY_DISABLE_CORS_HEADERS=false
    networks:
      - pulse-network

  pulse-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cpu
    container_name: pulse-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      - DATABASE_URL=postgresql://postgres:root@pulse-db:5432/nexpulse
      - FRONTEND_URL=http://localhost:5173
      - AWS_ENDPOINT_URL=http://pulse-floci:4566
      - AWS_ACCESS_KEY_ID=mock
      - AWS_SECRET_ACCESS_KEY=mock
      - AWS_REGION=ap-south-1
      - AWS_DEFAULT_REGION=ap-south-1
    volumes:
      - ./backend:/app
    depends_on:
      pulse-db:
        condition: service_healthy
      pulse-floci:
        condition: service_started
    networks:
      - pulse-network

  pulse-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pulse-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.local
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - pulse-backend
    networks:
      - pulse-network

volumes:
  pulse-db-data:
    name: pulse-db-data

networks:
  pulse-network:
    name: pulse-network
