version: '3.8'

services:
  pulse-db:
    image: postgres:17
    container_name: pulse-db
    environment:
      POSTGRES_DB: nexpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pulse-db-data:/var/lib/postgresql/data
    networks:
      - pulse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  pulse-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulse-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      - DATABASE_URL=postgresql://postgres:root@pulse-db:5432/nexpulse
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend:/app
    depends_on:
      pulse-db:
        condition: service_healthy
    networks:
      - pulse-network

  pulse-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pulse-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.local
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - pulse-backend
    networks:
      - pulse-network

volumes:
  pulse-db-data:
    name: pulse-db-data

networks:
  pulse-network:
    name: pulse-network
