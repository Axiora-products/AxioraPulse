name: App Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      component:
        required: true
        type: string # 'backend' or 'frontend'
      aws_region:
        required: false
        type: string
        default: 'ap-south-1'
      ecr_registry:
        required: false
        type: string
        default: '217757579310.dkr.ecr.ap-south-1.amazonaws.com'
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true
      # Optional secrets for frontend build args
      VITE_COGNITO_USER_POOL_ID: { required: false }
      VITE_COGNITO_APP_CLIENT_ID: { required: false }
      VITE_FRONTEND_URL: { required: false }
      VITE_API_BASE_URL: { required: false }

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ inputs.ecr_registry }}
          ECR_REPOSITORY: axiora/pulse-${{ inputs.component }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY
          
          BUILD_ARGS=""
          if [ "${{ inputs.component }}" == "frontend" ]; then
            BUILD_ARGS="--build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
                        --build-arg VITE_COGNITO_APP_CLIENT_ID=${{ secrets.VITE_COGNITO_APP_CLIENT_ID }} \
                        --build-arg VITE_FRONTEND_URL=${{ secrets.VITE_FRONTEND_URL }} \
                        --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}"
          fi
          
          DOCKERFILE_PATH="${{ inputs.component }}/Dockerfile"
          if [ "${{ inputs.component }}" == "backend" ]; then
            DOCKERFILE_PATH="backend/Dockerfile.prod"
          fi

          docker build --platform linux/amd64 $BUILD_ARGS -f $DOCKERFILE_PATH -t $IMAGE_URI:latest -t $IMAGE_URI:$IMAGE_TAG ./${{ inputs.component }}
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG
          echo "image=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS Service
        run: |
          # Simplified update. For robust deployment, use amazon-ecs-render-task-definition
          # But since we want to move towards CDK managing the image tag, 
          # for now we use the AWS CLI to trigger a deployment with the 'latest' or specific tag.
          CLUSTER="axiora-pulse-cluster-${{ inputs.environment }}"
          SERVICE="pulse-${{ inputs.component }}-service-${{ inputs.environment }}"
          
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment
