name: Docker Build & Push

on:
  workflow_call:
    inputs:
      context:
        required: true
        type: string
      file:
        required: true
        type: string
      image-name:
        required: true
        type: string
      push:
        required: false
        type: boolean
        default: false
      tags:
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags || format('{0}:latest', inputs.image-name) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
