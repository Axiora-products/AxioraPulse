name: CI Quality Gate

on:
  workflow_call:
    inputs:
      check_backend:
        required: false
        type: boolean
        default: true
      check_frontend:
        required: false
        type: boolean
        default: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Gitleaks to scan history

      # 1. Secret Detection
      - name: Secret Detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Backend Checks (Python)
      - name: Set up Python
        if: inputs.check_backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Static Analysis (Ruff)
        if: inputs.check_backend
        run: |
          pip install ruff
          ruff check backend/ --output-format=github

      - name: Security Scanning (Bandit)
        if: inputs.check_backend
        run: |
          pip install bandit
          bandit -r backend/ -ll

      # 3. Frontend Checks (Node.js)
      - name: Set up Node.js
        if: inputs.check_frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        if: inputs.check_frontend
        run: |
          cd frontend
          npm ci

      - name: Static Analysis (ESLint)
        if: inputs.check_frontend
        run: |
          cd frontend
          npm run lint || echo "Lint warnings found"

      - name: Security Scanning (npm audit)
        if: inputs.check_frontend
        run: |
          cd frontend
          npm audit --audit-level=high

      # 4. Infrastructure Checks (CDK)
      - name: CDK Validation (Synth + cdk-nag)
        run: |
          cd infra/cdk
          npm ci
          npx cdk synth
