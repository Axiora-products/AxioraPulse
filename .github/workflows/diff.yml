name: CDK Diff

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: 'ap-south-1'
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true

jobs:
  cdk-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install CDK Dependencies
        run: |
          cd infra/cdk
          npm ci

      - name: CDK Diff
        id: diff
        env:
          CDK_PROD_ENABLED: ${{ inputs.environment == 'prod' && 'true' || 'false' }}
        run: |
          cd infra/cdk
          STACK_SUFFIX=$(echo "${{ inputs.environment }}" | awk '{print toupper(substr($0,1,1))tolower(substr($0,2))}')
          STACK_NAME="AxioraPulseStack${STACK_SUFFIX}"
          
          npx cdk diff $STACK_NAME > diff_output.txt 2>&1 || true
          cat diff_output.txt
          
          echo "### CDK Diff for $STACK_NAME (${{ inputs.environment }})" > comment.md
          echo "\`\`\`" >> comment.md
          cat diff_output.txt >> comment.md
          echo "\`\`\`" >> comment.md
          
      - name: Post Diff to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
