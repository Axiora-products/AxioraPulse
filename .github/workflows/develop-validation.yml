name: Develop Validation & QA Build

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      branch-type: ${{ steps.branch-type.outputs.type }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Determine Branch Type
        id: branch-type
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "type=develop" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/test/ ]]; then
            echo "type=release-test" >> $GITHUB_OUTPUT
          fi
      
      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'ruff.toml'
              - '.github/workflows/develop-validation.yml'
              - '.github/workflows/backend-validation.yml'
              - '.github/workflows/docker-build.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/develop-validation.yml'
              - '.github/workflows/frontend-validation.yml'
              - '.github/workflows/docker-build.yml'
            infra:
              - 'infra/cdk/**'
              - '.github/workflows/cdk-validation.yml'

  backend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/backend-validation.yml
    with:
      is-pr: false
      base-ref: ''

  cdk-validation:
    needs: changes
    if: ${{ needs.changes.outputs.infra == 'true' }}
    uses: ./.github/workflows/cdk-validation.yml

  # 🐳 ECR Push for develop branch pushes
  backend-docker-qa:
    needs: [changes, backend-tests]
    if: ${{ always() && needs.changes.outputs.backend == 'true' && needs.backend-tests.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::399894608507:role/GitHubActionsDeployerRole
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/axiora/pulse-fastapi-qa:sha-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/axiora/pulse-fastapi-qa:qa
            ${{ steps.login-ecr.outputs.registry }}/axiora/pulse-fastapi-qa:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/axiora/pulse-fastapi-qa:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/axiora/pulse-fastapi-qa:buildcache,mode=max

  frontend-docker-qa:
    needs: changes
    if: ${{ always() && needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::399894608507:role/GitHubActionsDeployerRole
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch Frontend Config from SSM
        id: fetch-ssm
        run: |
          echo "Fetching Cognito and URL configurations from SSM..."
          USER_POOL_ID=$(aws ssm get-parameter --name "/axiorapulse/qa/COGNITO_USER_POOL_ID" --region ap-south-1 --query "Parameter.Value" --output text)
          APP_CLIENT_ID=$(aws ssm get-parameter --name "/axiorapulse/qa/COGNITO_APP_CLIENT_ID" --region ap-south-1 --query "Parameter.Value" --output text)
          FRONTEND_URL=$(aws ssm get-parameter --name "/axiorapulse/qa/FRONTEND_URL" --region ap-south-1 --query "Parameter.Value" --output text)
          API_BASE_URL="${FRONTEND_URL}:8000"

          echo "USER_POOL_ID=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "APP_CLIENT_ID=$APP_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "API_BASE_URL=$API_BASE_URL" >> $GITHUB_OUTPUT

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_COGNITO_USER_POOL_ID=${{ steps.fetch-ssm.outputs.USER_POOL_ID }}
            VITE_COGNITO_APP_CLIENT_ID=${{ steps.fetch-ssm.outputs.APP_CLIENT_ID }}
            VITE_FRONTEND_URL=${{ steps.fetch-ssm.outputs.FRONTEND_URL }}
            VITE_API_BASE_URL=${{ steps.fetch-ssm.outputs.API_BASE_URL }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/axiora/pulse-frontend-qa:sha-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/axiora/pulse-frontend-qa:qa
            ${{ steps.login-ecr.outputs.registry }}/axiora/pulse-frontend-qa:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/axiora/pulse-frontend-qa:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/axiora/pulse-frontend-qa:buildcache,mode=max
