name: AxioraPulse Master Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/cdk/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infra/cdk/**'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to deploy to'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - prod

jobs:
  # 1. Quality Gate
  ci-quality-gate:
    uses: ./.github/workflows/templates/ci-quality-gate.yml
    with:
      check_backend: true
      check_frontend: true

  # 2. CDK Diff as a Gate (For Pull Requests)
  cdk-diff-qa:
    needs: ci-quality-gate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/templates/cdk-diff.yml
    with:
      environment: qa
    secrets:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

  # 3. Deploy to QA (Auto-deploy on push to develop/main)
  deploy-qa-infra:
    needs: ci-quality-gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/templates/cdk-deploy.yml
    with:
      environment: qa
    secrets:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

  deploy-qa-backend:
    needs: deploy-qa-infra
    uses: ./.github/workflows/templates/app-deploy.yml
    with:
      environment: qa
      component: backend
    secrets: inherit

  deploy-qa-frontend:
    needs: deploy-qa-infra
    uses: ./.github/workflows/templates/app-deploy.yml
    with:
      environment: qa
      component: frontend
    secrets: inherit

  # 4. Deploy to PROD (Requires Manual Approval via GitHub Environment)
  deploy-prod-infra:
    needs: [deploy-qa-backend, deploy-qa-frontend]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target_env == 'prod')
    uses: ./.github/workflows/templates/cdk-deploy.yml
    with:
      environment: prod
    secrets:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

  deploy-prod-backend:
    needs: deploy-prod-infra
    uses: ./.github/workflows/templates/app-deploy.yml
    with:
      environment: prod
      component: backend
    secrets: inherit

  deploy-prod-frontend:
    needs: deploy-prod-infra
    uses: ./.github/workflows/templates/app-deploy.yml
    with:
      environment: prod
      component: frontend
    secrets: inherit
