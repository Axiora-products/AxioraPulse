name: AxioraPulse Master Pipeline

on:
  push:
    branches:
      - main
      - develop
      - fix/workflow-paths-syntax
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/cdk/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop
      - fix/workflow-paths-syntax
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/cdk/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to deploy to'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - prod

jobs:
  # 1. Quality Gate
  ci-quality-gate:
    uses: ./.github/workflows/ci.yml
    with:
      check_backend: true
      check_frontend: true

  # 2. CDK Diff (For PRs or Manual Checks)
  cdk-diff-qa:
    needs: ci-quality-gate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/diff.yml
    with:
      environment: qa
    secrets: inherit

  # 3. QA Environment Deployment
  deploy-qa-infra:
    needs: ci-quality-gate
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target_env == 'qa')
    uses: ./.github/workflows/cdk.yml
    with:
      environment: qa
    secrets: inherit

  deploy-qa-app-backend:
    needs: deploy-qa-infra
    uses: ./.github/workflows/app.yml
    with:
      environment: qa
      component: backend
    secrets: inherit

  deploy-qa-app-frontend:
    needs: deploy-qa-infra
    uses: ./.github/workflows/app.yml
    with:
      environment: qa
      component: frontend
    secrets: inherit

  # 4. Production Environment Deployment
  deploy-prod-infra:
    needs: [deploy-qa-app-backend, deploy-qa-app-frontend]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.target_env == 'prod')
    uses: ./.github/workflows/cdk.yml
    with:
      environment: prod
    secrets: inherit

  deploy-prod-app-backend:
    needs: deploy-prod-infra
    uses: ./.github/workflows/app.yml
    with:
      environment: prod
      component: backend
    secrets: inherit

  deploy-prod-app-frontend:
    needs: deploy-prod-infra
    uses: ./.github/workflows/app.yml
    with:
      environment: prod
      component: frontend
    secrets: inherit
