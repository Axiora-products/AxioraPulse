name: CDK Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string # 'qa' or 'prod'
      aws_region:
        required: false
        type: string
        default: 'ap-south-1'
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install CDK Dependencies
        run: |
          cd infra/cdk
          npm ci

      - name: CDK Deploy
        env:
          CDK_PROD_ENABLED: ${{ inputs.environment == 'prod' && 'true' || 'false' }}
        run: |
          cd infra/cdk
          # Determine stack name based on environment
          # AxioraPulseStackQa or AxioraPulseStackProd
          STACK_SUFFIX=$(echo "${{ inputs.environment }}" | awk '{print toupper(substr($0,1,1))tolower(substr($0,2))}')
          npx cdk deploy AxioraPulseStack${STACK_SUFFIX} --require-approval never
