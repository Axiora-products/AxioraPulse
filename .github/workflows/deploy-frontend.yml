name: Deploy Frontend to ECS

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  AWS_REGION:       ap-south-1
  ECR_REPOSITORY:   axiora/pulse-frontend
  CONTAINER_NAME:   pulse-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get AWS Account ID
        id: account
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "account_id=217757579310" >> $GITHUB_OUTPUT
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "account_id=079975324160" >> $GITHUB_OUTPUT
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ steps.account.outputs.account_id }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}
          docker build --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
            --build-arg VITE_COGNITO_APP_CLIENT_ID=${{ secrets.VITE_COGNITO_APP_CLIENT_ID }} \
            --build-arg VITE_FRONTEND_URL=${{ secrets.VITE_FRONTEND_URL }} \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:$IMAGE_TAG \
            ./frontend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG
          echo "image=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Logout of Amazon ECR
        if: always()
        run: docker logout ${{ steps.login-ecr.outputs.registry }}

      - name: Process Task Definition Template
        env:
          AWS_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
          ENV_NAME: ${{ steps.account.outputs.env_name }}
        run: |
          export EXECUTION_ROLE_NAME="ecsTaskExecutionRole-${ENV_NAME}"
          export LOG_GROUP="/ecs/pulse-frontend-${ENV_NAME}"
          envsubst < frontend/ecs-task-def.json > frontend/ecs-task-def-rendered.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend/ecs-task-def-rendered.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  pulse-frontend-service-${{ steps.account.outputs.env_name }}
          cluster:                  axiora-pulse-cluster-${{ steps.account.outputs.env_name }}
          wait-for-service-stability: true
