name: Deploy Frontend to ECS (PROD)

on:
  # Disable automatic deployment to PROD
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'frontend/**'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "CONFIRM" to deploy to PROD'
        required: true
        default: 'CANCEL'

concurrency:
  group: deploy-frontend-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:       ap-south-1
  AWS_ACCOUNT_ID:   217757579310
  ENVIRONMENT_NAME: production
  ECR_REPOSITORY:   axiora/pulse-frontend
  CONTAINER_NAME:   FrontendContainer

jobs:
  build-and-deploy:
    if: github.event.inputs.confirm == 'CONFIRM'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}
          docker build --platform linux/amd64 \
            --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
            --build-arg VITE_COGNITO_APP_CLIENT_ID=${{ secrets.VITE_COGNITO_APP_CLIENT_ID }} \
            --build-arg VITE_FRONTEND_URL=${{ secrets.VITE_FRONTEND_URL }} \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:$IMAGE_TAG \
            ./frontend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG
          echo "image=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Logout of Amazon ECR
        if: always()
        run: docker logout ${{ steps.login-ecr.outputs.registry }}

      - name: Prep task definition for Production
        run: |
          sed -i "s/079975324160/${{ env.AWS_ACCOUNT_ID }}/g" frontend/ecs-task-def.json
          sed -i "s/pulse-frontend-dev/pulse-frontend-${{ env.ENVIRONMENT_NAME }}/g" frontend/ecs-task-def.json
          sed -i "s/\"family\": \"pulse-frontend\"/\"family\": \"pulse-frontend-${{ env.ENVIRONMENT_NAME }}\"/g" frontend/ecs-task-def.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend/ecs-task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  pulse-frontend-service-production
          cluster:                  axiora-pulse-cluster-production
          wait-for-service-stability: true
