name: Deploy Frontend to ECS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  AWS_REGION:       ap-south-1
  ECR_REGISTRY:     217757579310.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY:   axiora/pulse-frontend
  ECS_CLUSTER:      axiora-pulse-cluster
  ECS_SERVICE:      pulse-frontend-service
  CONTAINER_NAME:   pulse-frontend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Check Formatting (Prettier)
        run: |
          cd frontend
          npx prettier --check "src/**/*.{js,jsx,css,md}"

      - name: Build Verification
        run: |
          cd frontend
          npm run build

  build-and-deploy:
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          docker build --platform linux/amd64 \
            --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
            --build-arg VITE_COGNITO_APP_CLIENT_ID=${{ secrets.VITE_COGNITO_APP_CLIENT_ID }} \
            --build-arg VITE_FRONTEND_URL=${{ secrets.VITE_FRONTEND_URL }} \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:${{ github.sha }} \
            ./frontend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}
          echo "image=$IMAGE_URI:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend/ecs-task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
