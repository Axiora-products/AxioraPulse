name: CI/CD Pipeline (Dev)

on:
  push:
    branches:
      - develop
      - main
      - 'release/**'
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      cdk: ${{ steps.filter.outputs.cdk }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'ruff.toml'
              - '.github/workflows/pipeline.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/pipeline.yml'
            cdk:
              - 'infra/**'
              - '.github/workflows/pipeline.yml'

  backend-lint-and-test:
    name: Backend Lint & Test
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:root@localhost:5432/nexpulse
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_DEFAULT_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: mock
      AWS_SECRET_ACCESS_KEY: mock
      SECRET_KEY: mock_secret_key_for_testing_purposes_only
      PYTHONPATH: backend
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nexpulse
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data
          
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python Virtualenv
        uses: actions/cache@v4
        id: python-cache
        with:
          path: backend/.venv
          key: ${{ runner.os }}-python-venv-${{ hashFiles('backend/requirements.txt', '.github/workflows/pipeline.yml') }}

      - name: Install Backend Dependencies
        if: steps.python-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt pytest ruff alembic pytest-cov diff-cover

      - name: Add Virtualenv to PATH
        run: |
          echo "${{ github.workspace }}/backend/.venv/bin" >> $GITHUB_PATH

      - name: Cache Ruff
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: ${{ runner.os }}-ruff-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ruff-${{ github.ref_name }}-
            ${{ runner.os }}-ruff-

      - name: Run Ruff Lint Check
        run: |
          ruff check backend

      - name: Run Ruff Format Check
        run: |
          ruff format --check backend

      - name: Run Alembic Migrations on Test DB
        run: |
          cd backend
          alembic upgrade head

      - name: Run Backend Pytest
        run: |
          pytest --cov=backend --cov-report=xml backend/tests

      - name: Generate Diff Coverage Report
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          diff-cover coverage.xml --compare-branch=origin/${{ github.event.pull_request.base.ref }} --format markdown:diff-coverage.md

      - name: Comment PR with Diff Coverage
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: diff-coverage.md

      - name: Enforce Diff Coverage Threshold
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml --compare-branch=origin/${{ github.event.pull_request.base.ref }} --fail-under=80

  frontend-build:
    name: Frontend Build
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Frontend Node Modules
        uses: actions/cache@v4
        id: frontend-cache
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Frontend Dependencies
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        run: |
          npm install --prefix frontend

      - name: Build Frontend (Compilation Check)
        run: |
          npm run build --prefix frontend

  cdk-test-and-synth:
    name: CDK Test & Synth
    needs: changes
    if: ${{ needs.changes.outputs.cdk == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache CDK Node Modules
        uses: actions/cache@v4
        id: cdk-cache
        with:
          path: infra/cdk/node_modules
          key: ${{ runner.os }}-cdk-${{ hashFiles('infra/cdk/package-lock.json') }}

      - name: Install CDK Dependencies
        if: steps.cdk-cache.outputs.cache-hit != 'true'
        run: |
          npm install --prefix infra/cdk

      - name: Compile CDK (TypeScript Check)
        run: |
          npm run build --prefix infra/cdk

      - name: Run CDK Jest Tests
        run: |
          npm run test --prefix infra/cdk

      - name: Run CDK Synth
        env:
          CDK_PROD_ENABLED: "true"
          CDK_NAG_ENABLED: ${{ (github.ref_name == 'main' || startsWith(github.ref_name, 'release/')) && 'true' || 'false' }}
        run: |
          cd infra/cdk
          npx cdk synth AxioraPulseStackQa

