name: CI/CD Pipeline (Dev)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (Quality Gates)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nexpulse
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      moto:
        image: motoserver/moto:latest
        ports:
          - 5001:5000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- Backend Quality Gates ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest ruff alembic

      - name: Run Ruff Lint Check
        run: |
          ruff check backend

      - name: Run Ruff Format Check
        run: |
          ruff format --check backend

      - name: Run Alembic Migrations on Test DB
        env:
          DATABASE_URL: postgresql://postgres:root@localhost:5432/nexpulse
        run: |
          cd backend
          alembic upgrade head

      - name: Run Backend Pytest
        env:
          DATABASE_URL: postgresql://postgres:root@localhost:5432/nexpulse
          AWS_ENDPOINT_URL: http://localhost:5001
          AWS_DEFAULT_REGION: ap-south-1
          AWS_ACCESS_KEY_ID: mock
          AWS_SECRET_ACCESS_KEY: mock
        run: |
          pytest backend/tests

      # --- Frontend Quality Gates ---
      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          npm install --prefix frontend

      - name: Build Frontend (Compilation Check)
        run: |
          npm run build --prefix frontend

      # --- CDK Quality Gates ---
      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'infra/cdk/package-lock.json'

      - name: Install CDK Dependencies
        run: |
          npm install --prefix infra/cdk

      - name: Compile CDK (TypeScript Check)
        run: |
          npm run build --prefix infra/cdk

      - name: Run CDK Jest Tests
        run: |
          npm run test --prefix infra/cdk

      - name: Run CDK Synth
        run: |
          cd infra/cdk
          npx cdk synth AxioraPulseStackDev

  deploy-dev:
    name: Deploy to Dev
    needs: lint-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- AWS Authentication via OIDC ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ap-south-1
          audience: sts.amazonaws.com

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Build & Push Docker Images ---
      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --build-arg PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cpu \
            -t $ECR_REGISTRY/axiora/pulse-fastapi-dev:${{ github.sha }} \
            -t $ECR_REGISTRY/axiora/pulse-fastapi-dev:latest \
            -f backend/Dockerfile backend
          docker push $ECR_REGISTRY/axiora/pulse-fastapi-dev --all-tags

      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/axiora/pulse-frontend-dev:${{ github.sha }} \
            -t $ECR_REGISTRY/axiora/pulse-frontend-dev:latest \
            -f frontend/Dockerfile frontend
          docker push $ECR_REGISTRY/axiora/pulse-frontend-dev --all-tags

      # --- Deploy CDK Stack ---
      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'infra/cdk/package-lock.json'

      - name: Install CDK Dependencies
        run: |
          npm install --prefix infra/cdk


      - name: Deploy CDK Dev Stack
        run: |
          cd infra/cdk
          npx cdk deploy AxioraPulseStackDev --require-approval never
