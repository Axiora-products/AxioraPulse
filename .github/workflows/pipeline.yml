name: CI/CD Pipeline (Dev)

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - main
      - 'release/**'
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test (Quality Gates)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:root@localhost:5432/nexpulse
      AWS_ENDPOINT_URL: http://localhost:5001
      AWS_DEFAULT_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: mock
      AWS_SECRET_ACCESS_KEY: mock
      SECRET_KEY: mock_secret_key_for_testing_purposes_only
      PYTHONPATH: backend
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nexpulse
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      moto:
        image: motoserver/moto:latest
        ports:
          - 5001:5000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Backend Quality Gates ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest ruff alembic pytest-cov diff-cover

      - name: Run Ruff Lint Check
        run: |
          ruff check backend

      - name: Run Ruff Format Check
        run: |
          ruff format --check backend

      - name: Run Alembic Migrations on Test DB
        run: |
          cd backend
          alembic upgrade head

      - name: Run Backend Pytest
        run: |
          pytest --cov=backend --cov-report=xml backend/tests

      - name: Generate Diff Coverage Report
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          diff-cover coverage.xml --compare-branch=origin/${{ github.event.pull_request.base.ref }} --format markdown:diff-coverage.md

      - name: Comment PR with Diff Coverage
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: diff-coverage.md

      - name: Enforce Diff Coverage Threshold
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml --compare-branch=origin/${{ github.event.pull_request.base.ref }} --fail-under=80

      # --- Frontend Quality Gates ---
      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          npm install --prefix frontend

      - name: Build Frontend (Compilation Check)
        run: |
          npm run build --prefix frontend

      # --- CDK Quality Gates ---
      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'infra/cdk/package-lock.json'

      - name: Install CDK Dependencies
        run: |
          npm install --prefix infra/cdk

      - name: Compile CDK (TypeScript Check)
        run: |
          npm run build --prefix infra/cdk

      - name: Run CDK Jest Tests
        run: |
          npm run test --prefix infra/cdk

      - name: Run CDK Synth
        env:
          CDK_PROD_ENABLED: "true"
          CDK_NAG_ENABLED: ${{ (github.ref_name == 'main' || startsWith(github.ref_name, 'release/')) && 'true' || 'false' }}
        run: |
          cd infra/cdk
          npx cdk synth AxioraPulseStackQa

