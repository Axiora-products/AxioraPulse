name: Deploy Backend to ECS (QA)

on:
  push:
    branches:
      - 'release/**'
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend-qa-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:       ap-south-1
  # Using the actual QA registry
  ECR_REGISTRY:     681816818894.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY:   axiora/pulse-fastapi-qa
  ECS_CLUSTER:      axiora-pulse-cluster-qa
  ECS_SERVICE:      pulse-backend-service-qa
  CONTAINER_NAME:   BackendContainer

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          # Tag with 'dev-latest' and SHA to avoid overwriting prod 'latest'
          docker build --platform linux/amd64 -f backend/Dockerfile.prod -t $IMAGE_URI:dev-latest -t $IMAGE_URI:dev-${{ github.sha }} ./backend
          docker push $IMAGE_URI:dev-latest
          docker push $IMAGE_URI:dev-${{ github.sha }}
          echo "image=$IMAGE_URI:dev-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          # We need a way to handle task definitions for different environments
          # For now, we use a placeholder or assume the family name handles it
          task-definition: backend/ecs-task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
