name: CI Quality Gate

on:
  workflow_call:
    inputs:
      check_backend:
        required: false
        type: boolean
        default: true
      check_frontend:
        required: false
        type: boolean
        default: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Checks
      - name: Set up Python
        if: inputs.check_backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Static Analysis (Ruff)
        if: inputs.check_backend
        run: |
          pip install ruff
          ruff check backend/ --output-format=github
