name: Deploy Backend to ECS (PROD)

on:
  # Disable automatic deployment to PROD
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'backend/**'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "CONFIRM" to deploy to PROD'
        required: true
        default: 'CANCEL'

concurrency:
  group: deploy-backend-prod-${{ github.ref }}
  cancel-in-progress: false # Better for prod to wait or fail than cancel midway

env:
  AWS_REGION:       ap-south-1
  ECR_REGISTRY:     217757579310.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY:   axiora/pulse-fastapi
  ECS_CLUSTER:      axiora-pulse-cluster
  ECS_SERVICE:      pulse-backend-service
  CONTAINER_NAME:   pulse-backend

jobs:
  build-and-deploy:
    if: github.event.inputs.confirm == 'CONFIRM'
    runs-on: ubuntu-latest
    environment: production # Use GitHub Environments for protection
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          docker build --platform linux/amd64 -f backend/Dockerfile.prod -t $IMAGE_URI:latest -t $IMAGE_URI:${{ github.sha }} ./backend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}
          echo "image=$IMAGE_URI:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/ecs-task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
