name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION:       ap-south-1
  ECR_REPOSITORY:   axiora/pulse-fastapi
  CONTAINER_NAME:   pulse-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get AWS Account ID
        id: account
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "account_id=217757579310" >> $GITHUB_OUTPUT
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "short_env=prod" >> $GITHUB_OUTPUT
          else
            echo "account_id=079975324160" >> $GITHUB_OUTPUT
            echo "env_name=development" >> $GITHUB_OUTPUT
            echo "short_env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ steps.account.outputs.account_id }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}
          docker build --platform linux/amd64 -f backend/Dockerfile.prod -t $IMAGE_URI:latest -t $IMAGE_URI:$IMAGE_TAG ./backend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG
          echo "image=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Logout of Amazon ECR
        if: always()
        run: docker logout ${{ steps.login-ecr.outputs.registry }}

      - name: Process Task Definition Template
        env:
          AWS_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
          ENV_NAME: ${{ steps.account.outputs.env_name }}
          SHORT_ENV: ${{ steps.account.outputs.short_env }}
        run: |
          export EXECUTION_ROLE_NAME="ecsTaskExecutionRole-${ENV_NAME}"
          export TASK_ROLE_NAME="ecsTaskRole-${ENV_NAME}"
          export LOG_GROUP="/ecs/pulse-backend-${ENV_NAME}"
          export SHORT_ENV="${SHORT_ENV}"
          envsubst < backend/ecs-task-def.json > backend/ecs-task-def-rendered.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/ecs-task-def-rendered.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  pulse-backend-service-${{ steps.account.outputs.env_name }}
          cluster:                  axiora-pulse-cluster-${{ steps.account.outputs.env_name }}
          wait-for-service-stability: true
