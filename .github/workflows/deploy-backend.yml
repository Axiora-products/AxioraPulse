name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION:       ap-south-1
  ECR_REGISTRY:     217757579310.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY:   axiora/pulse-fastapi
  ECS_CLUSTER:      axiora-pulse-cluster
  ECS_SERVICE:      pulse-backend-service
  CONTAINER_NAME:   pulse-backend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Ruff (Linting)
        run: |
          cd backend
          ruff check .

      - name: Run Bandit (Security Scan)
        run: |
          cd backend
          bandit -r app core db routes schemas services -ll

      - name: Run Pip-Audit (Vulnerability Scan)
        run: |
          cd backend
          pip-audit

      - name: Run Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          SECRET_KEY: ci-test-key-32-chars-minimum-length
          COGNITO_USER_POOL_ID: dummy
          COGNITO_APP_CLIENT_ID: dummy
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          pytest

  build-and-deploy:
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          docker build --platform linux/amd64 -f backend/Dockerfile.prod -t $IMAGE_URI:latest -t $IMAGE_URI:${{ github.sha }} ./backend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}
          echo "image=$IMAGE_URI:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/ecs-task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
