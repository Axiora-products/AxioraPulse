name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION:       ap-south-1
  ECR_REPOSITORY:   axiora/pulse-fastapi
  ECS_CLUSTER:      axiora-pulse-cluster
  ECS_SERVICE:      pulse-backend-service
  CONTAINER_NAME:   pulse-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: get-account-id
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}
          docker build --platform linux/amd64 -f backend/Dockerfile.prod -t $IMAGE_URI:latest -t $IMAGE_URI:$IMAGE_TAG ./backend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG
          echo "image=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Logout of Amazon ECR
        if: always()
        run: docker logout ${{ steps.login-ecr.outputs.registry }}

      - name: Process Task Definition Template
        env:
          AWS_ACCOUNT_ID: ${{ steps.get-account-id.outputs.account_id }}
          ENV_NAME: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
        run: |
          envsubst < backend/ecs-task-def.json > backend/ecs-task-def-rendered.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/ecs-task-def-rendered.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
