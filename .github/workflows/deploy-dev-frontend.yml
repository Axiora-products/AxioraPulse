name: Deploy Frontend to ECS (DEV)

on:
  push:
    branches:
      - develop
    paths:
      - 'frontend/**'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:       ap-south-1
  AWS_ACCOUNT_ID:   079975324160
  ENVIRONMENT_NAME: dev
  ECR_REGISTRY:     079975324160.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY:   axiora/pulse-frontend
  ECS_CLUSTER:      axiora-pulse-cluster-dev
  ECS_SERVICE:      pulse-frontend-service-dev
  CONTAINER_NAME:   FrontendContainer

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          # Tag with 'dev-latest' and SHA to avoid overwriting prod 'latest'
          docker build --platform linux/amd64 \
            --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
            --build-arg VITE_COGNITO_APP_CLIENT_ID=${{ secrets.VITE_COGNITO_APP_CLIENT_ID }} \
            --build-arg VITE_FRONTEND_URL=${{ secrets.VITE_FRONTEND_URL }} \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            -t $IMAGE_URI:dev-latest \
            -t $IMAGE_URI:dev-${{ github.sha }} \
            ./frontend
          docker push $IMAGE_URI:dev-latest
          docker push $IMAGE_URI:dev-${{ github.sha }}
          echo "image=$IMAGE_URI:dev-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Prep task definition for DEV
        run: |
          sed -i "s/079975324160/${{ env.AWS_ACCOUNT_ID }}/g" frontend/ecs-task-def.json
          sed -i "s/pulse-frontend-dev/pulse-frontend-${{ env.ENVIRONMENT_NAME }}/g" frontend/ecs-task-def.json
          sed -i "s/\"family\": \"pulse-frontend\"/\"family\": \"pulse-frontend-${{ env.ENVIRONMENT_NAME }}\"/g" frontend/ecs-task-def.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend/ecs-task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
